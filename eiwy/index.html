<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychological Browser Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .hidden {
            display: none;
        }
        #eye {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border: 5px solid #ffffff;
            transition: all 0.1s;
        }
        #watchingMeter {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: 200px;
            height: 10px;
            background-color: #444;
            border-radius: 5px;
        }
        #watchingMeterFill {
            height: 100%;
            width: 0;
            background-color: #ff0000;
            border-radius: 5px;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <div id="eye"></div>
    <div id="watchingMeter"><div id="watchingMeterFill"></div></div>
    <script>
        const eye = document.getElementById('eye');
        const watchingMeterFill = document.getElementById('watchingMeterFill');
        let isIdle = false;
        let idleTimeout;
        const idleTimeLimit = 5000; // 5 seconds

        // Function to handle mouse movement
        document.addEventListener('mousemove', (event) => {
            eye.style.transform = `translate(-50%, -50%) translate(${event.clientX - window.innerWidth / 2}px, ${event.clientY - window.innerHeight / 2}px)`;
            setWatchingMeter(1);
            resetIdle();
        });

        // Function to reset idle timer
        function resetIdle() {
            clearTimeout(idleTimeout);
            isIdle = false;
            watchingMeterFill.style.width = '100%';
            idleTimeout = setTimeout(() => {
                isIdle = true;
                watchingMeterFill.style.width = '0%';
                promptPhilosophicalThought();
            }, idleTimeLimit);
        }

        // Function to set watching meter fill
        function setWatchingMeter(value) {
            watchingMeterFill.style.width = value * 100 + '%';
        }

        // Function to prompt philosophical thought
        function promptPhilosophicalThought() {
            const prompts = [
                'What is the meaning of existence?',
                'Are we merely observers of life?',
                'Is reality a construct of our perception?'
            ];
            const thought = prompts[Math.floor(Math.random() * prompts.length)];
            alert(thought);
        }
    </script>
</body>
</html>
