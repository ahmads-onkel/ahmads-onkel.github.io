<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      color: #e0e0e0;
      font-family: 'Geist Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 340px;
      animation: up 0.4s ease forwards;
      opacity: 0;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .title {
      font-size: 12px;
      color: #2a2a2a;
      margin-bottom: 32px;
      letter-spacing: 0.06em;
    }

    .input-row {
      display: flex;
      align-items: center;
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: #2a2a2a; }
    .input-row.err { border-color: #2a1515; }

    .pre {
      padding: 0 10px;
      font-size: 12px;
      color: #222;
      white-space: nowrap;
      user-select: none;
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 14px 12px 14px 0;
      font-family: 'Geist Mono', monospace;
      font-size: 13px;
      color: #d0d0d0;
      caret-color: #444;
    }

    input::placeholder { color: #1e1e1e; }
    input:disabled { opacity: 0.4; }

    .errtxt {
      font-size: 11px;
      color: #4a2020;
      margin-bottom: 8px;
      display: none;
      letter-spacing: 0.03em;
    }
    .errtxt.on { display: block; }

    button {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-radius: 6px;
      padding: 13px;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #404040;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    button:hover:not(:disabled) { color: #888; border-color: #252525; }
    button:active:not(:disabled) { opacity: 0.6; }
    button:disabled { opacity: 0.25; cursor: not-allowed; }

    .stats {
      display: none;
      margin-top: 36px;
    }

    .stats.on { display: block; }

    .num {
      font-size: 52px;
      font-weight: 300;
      color: #c8c8c8;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 6px;
      transition: color 0.08s;
    }

    .num.tick { color: #fff; }

    .lbl {
      font-size: 11px;
      color: #1e1e1e;
      letter-spacing: 0.06em;
      margin-bottom: 24px;
    }

    .meta {
      font-size: 11px;
      color: #222;
      letter-spacing: 0.04em;
      margin-bottom: 20px;
    }

    .stop {
      background: transparent;
      border: 1px solid #161616;
      color: #222;
      padding: 10px;
      font-size: 11px;
    }

    .stop:hover:not(:disabled) { color: #555; border-color: #1e1e1e; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="title">guns.lol / viewer</div>

  <div class="input-row" id="row">
    <span class="pre">guns.lol/</span>
    <input id="u" type="text" placeholder="username" spellcheck="false" autocomplete="off" />
  </div>

  <div class="errtxt" id="err">enter a username.</div>

  <button id="btn" onclick="start()">send views</button>

  <div class="stats" id="stats">
    <div class="num" id="n">0</div>
    <div class="lbl">views sent</div>
    <div class="meta" id="meta">— views/s</div>
    <button class="stop" onclick="stop()">stop</button>
  </div>
</div>

<script>
  // !! Replace with your actual Cloudflare worker URL !!
  const WORKER = "https://e.kirstadio.workers.dev";

  let running = false;
  let views = 0;
  let recentTimes = [];

  const u     = document.getElementById('u');
  const btn   = document.getElementById('btn');
  const stats = document.getElementById('stats');
  const n     = document.getElementById('n');
  const err   = document.getElementById('err');
  const row   = document.getElementById('row');
  const meta  = document.getElementById('meta');

  u.addEventListener('keydown', e => { if (e.key === 'Enter') start(); });

  function bumpNum() {
    n.classList.add('tick');
    setTimeout(() => n.classList.remove('tick'), 80);
  }

  function trackReq(ok) {
    const now = Date.now();
    recentTimes.push({ t: now, ok });
    recentTimes = recentTimes.filter(r => now - r.t < 5000);
    const rps = (recentTimes.filter(r => r.ok).length / 5).toFixed(1);
    meta.textContent = rps + ' views/s';
  }

  async function sendView(user) {
    try {
      const r = await fetch(`${WORKER}/?user=${encodeURIComponent(user)}`);
      const data = await r.json();
      return data.status === 200;
    } catch {
      return false;
    }
  }

  async function loop(user) {
    while (running) {
      const ok = await sendView(user);
      if (ok) {
        views++;
        n.textContent = views;
        bumpNum();
      }
      trackReq(ok);
      await new Promise(r => setTimeout(r, 200));
    }
  }

  function start() {
    const user = u.value.trim();
    err.classList.remove('on');
    row.classList.remove('err');

    if (!user) {
      err.classList.add('on');
      row.classList.add('err');
      return;
    }

    if (running) return;
    running = true;
    views = 0;
    recentTimes = [];
    n.textContent = '0';
    btn.disabled = true;
    btn.textContent = 'running...';
    u.disabled = true;
    stats.classList.add('on');

    for (let i = 0; i < 15; i++) loop(user);
  }

  function stop() {
    running = false;
    btn.disabled = false;
    btn.textContent = 'send views';
    u.disabled = false;
    meta.textContent = '— views/s';
  }
</script>
</body>
</html>
