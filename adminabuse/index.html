<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Broadcast</title>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Patrick Hand', cursive;
      background: #fff;
      color: #111;
      height: 100vh;
      overflow: hidden;
    }

    #app { display: flex; height: 100vh; width: 100vw; }

    /* ── SHAKE ── */
    @keyframes shake {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      10%      { transform: translate(-8px,-6px) rotate(-1.5deg); }
      20%      { transform: translate(8px,6px) rotate(1.5deg); }
      30%      { transform: translate(-10px,4px) rotate(-1deg); }
      40%      { transform: translate(10px,-4px) rotate(1deg); }
      50%      { transform: translate(-6px,8px) rotate(-2deg); }
      60%      { transform: translate(6px,-8px) rotate(2deg); }
      70%      { transform: translate(-9px,3px) rotate(-1deg); }
      80%      { transform: translate(9px,-3px) rotate(1deg); }
      90%      { transform: translate(-4px,5px) rotate(-.5deg); }
    }
    body.shaking { animation: shake 0.6s ease; }

    /* ── MAIN ── */
    #main {
      flex: 1;
      position: relative;
      overflow: hidden;
      transition: background 1.2s ease;
      background: #fff;
    }

    /* ── CANVAS ── */
    #draw-canvas {
      position: absolute; inset: 0; z-index: 10;
      display: none; touch-action: none;
    }
    #draw-canvas.active    { display: block; cursor: crosshair; }
    #draw-canvas.view-only { display: block; pointer-events: none; }

    /* ── BANNERS ── */
    #banner-stack {
      position: absolute;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      z-index: 100; pointer-events: none;
      width: 90%; max-width: 540px;
    }
    .banner {
      background: #111; color: #fff;
      padding: 11px 22px;
      font-family: 'Patrick Hand', cursive;
      font-size: 16px;
      text-align: center; width: 100%;
      box-shadow: 0 3px 14px rgba(0,0,0,0.13);
      opacity: 0; transform: translateY(-12px) scale(.97);
      transition: transform .34s cubic-bezier(.22,.68,0,1.2), opacity .34s ease;
    }
    .banner.visible { opacity: 1; transform: translateY(0) scale(1); }
    .banner.fading  { opacity: 0; transform: translateY(-8px); transition: opacity 1.4s ease, transform 1.4s ease; }
    .banner-name    { font-weight: bold; }

    /* ── JUMPSCARE OVERLAY ── */
    #jumpscare-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 2000;
      background: #000;
      align-items: center; justify-content: center;
      pointer-events: none;
    }
    #jumpscare-overlay.show { display: flex; }
    #jumpscare-img {
      max-width: 90vw; max-height: 90vh;
      object-fit: contain;
      animation: jsPop .15s ease-out forwards;
    }
    @keyframes jsPop {
      0%   { transform: scale(0.4); opacity: 0; }
      60%  { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }
    /* flashing border */
    #jumpscare-overlay.show {
      animation: jsFlash 0.08s steps(1) infinite;
    }
    @keyframes jsFlash {
      0%   { outline: 8px solid red; }
      50%  { outline: 8px solid #ff0; }
      100% { outline: 8px solid red; }
    }

    /* ── POLL ── */
    #poll-widget {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(.92);
      background: #fff; border: 1.5px solid #111;
      padding: 22px 24px; width: 88%; max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      z-index: 80; opacity: 0; pointer-events: none;
      transition: opacity .28s ease, transform .28s ease;
    }
    #poll-widget.show { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }
    #poll-question { font-size: 17px; margin-bottom: 14px; color: #111; line-height: 1.4; }
    .poll-option   { margin-bottom: 8px; cursor: pointer; }
    .poll-bar-wrap { background: #f3f3f3; height: 36px; position: relative; overflow: hidden; border: 1px solid #e0e0e0; }
    .poll-bar-fill { background: #111; height: 100%; width: 0%; transition: width .5s ease; }
    .poll-bar-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 11px; font-size: 14px; color: #fff; mix-blend-mode: difference; pointer-events: none; }
    #poll-close { margin-top: 12px; font-family: 'Patrick Hand', cursive; font-size: 13px; background: none; border: 1px solid #ccc; padding: 6px 14px; cursor: pointer; color: #888; width: 100%; transition: border-color .2s, color .2s; }
    #poll-close:hover { border-color: #111; color: #111; }

    /* ── VIEWER PILL ── */
    #viewer-pill {
      position: absolute; bottom: 14px; left: 14px;
      background: rgba(255,255,255,0.9); border: 1px solid #e0e0e0;
      padding: 4px 12px; font-size: 12px; color: #888;
      z-index: 50; pointer-events: none;
    }
    #viewer-pill b { color: #111; }

    /* ── MOBILE CODE BOX ── */
    #mobile-code-box {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 999;
      background: #fff;
      border-top: 1.5px solid #e8e8e8;
      padding: 10px 16px 16px;
      text-align: center;
    }
    /* show code box on all screen sizes until admin unlocks */
    #mobile-code-box { display: block; }
    /* desktop: smaller and tucked bottom-right, not a full bar */
    @media (min-width: 601px) {
      #mobile-code-box {
        left: auto; right: 16px;
        bottom: 16px;
        border: 1px solid #e8e8e8;
        border-top: 1px solid #e8e8e8;
        padding: 8px 12px 10px;
        width: auto;
        box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      }
      #mobile-code-input { font-size: 14px; width: 110px; padding: 5px 8px; letter-spacing: 3px; }
      #mobile-code-btn   { font-size: 13px; padding: 6px 12px; }
      #mobile-code-label { font-size: 10px; }
    }
    #mobile-code-label { font-size: 11px; color: #aaa; margin-bottom: 6px; letter-spacing: .5px; }
    #mobile-code-row   { display: flex; gap: 8px; align-items: center; justify-content: center; }
    #mobile-code-input {
      font-family: 'Patrick Hand', cursive;
      font-size: 18px; width: 130px;
      border: 1.5px solid #ccc; padding: 8px 10px;
      outline: none; color: #111; background: #fff;
      letter-spacing: 4px; text-align: center;
      -webkit-appearance: none;
    }
    #mobile-code-input:focus { border-color: #111; }
    #mobile-code-btn {
      font-family: 'Patrick Hand', cursive;
      font-size: 16px; background: #111; color: #fff;
      border: none; padding: 8px 18px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #mobile-code-btn:active { opacity: .75; }

    /* ── ADMIN SIDEBAR — desktop ── */
    #admin-panel {
      width: 0; min-width: 0; overflow: hidden;
      background: #fff; border-left: 1.5px solid #e8e8e8;
      display: flex; flex-direction: column;
      transition: width .32s cubic-bezier(.22,.68,0,1.1), min-width .32s;
      z-index: 200; flex-shrink: 0;
    }
    #admin-panel.open { width: 260px; min-width: 260px; }

    #panel-inner { width: 260px; height: 100%; display: flex; flex-direction: column; overflow: hidden; }

    #panel-header { background: #111; padding: 11px 14px 10px; flex-shrink: 0; }
    #panel-header h1 { font-size: 15px; color: #fff; font-weight: normal; letter-spacing: .2px; }
    #panel-header p  { font-size: 10px; color: rgba(255,255,255,.5); margin-top: 2px; letter-spacing: .5px; }

    .admin-tabs {
      display: flex; background: #fafafa; border-bottom: 1.5px solid #e8e8e8; flex-shrink: 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .admin-tabs::-webkit-scrollbar { display: none; }
    .admin-tab {
      flex: 1; min-width: 40px; padding: 8px 3px;
      font-family: 'Patrick Hand', cursive; font-size: 11px;
      background: none; border: none; cursor: pointer; color: #bbb;
      border-bottom: 2px solid transparent; margin-bottom: -1.5px;
      transition: color .15s; white-space: nowrap;
    }
    .admin-tab.active             { color: #111; border-bottom-color: #111; }
    .admin-tab:hover:not(.active) { color: #555; }

    #panel-content { flex: 1; overflow-y: auto; overflow-x: hidden; }
    #panel-content::-webkit-scrollbar       { width: 3px; }
    #panel-content::-webkit-scrollbar-thumb { background: #e0e0e0; }

    /* ── ADMIN PANEL — mobile: full-screen slide-up sheet ── */
    @media (max-width: 600px) {
      #app { display: block; position: relative; }

      #main { width: 100vw; height: 100vh; }

      #admin-panel {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        width: 100% !important; min-width: 0 !important;
        height: 0;
        border-left: none;
        border-top: 1.5px solid #e8e8e8;
        transition: height .32s cubic-bezier(.22,.68,0,1.1);
        overflow: hidden;
        z-index: 500;
      }
      #admin-panel.open {
        height: 70vh;
        height: 70dvh;
      }

      #panel-inner {
        width: 100% !important;
        height: 70vh;
        height: 70dvh;
      }

      /* hide mobile code box when panel is open */
      #admin-panel.open ~ #mobile-code-box,
      body.admin-open #mobile-code-box { display: none !important; }

      /* drag handle bar at top of sheet */
      #panel-header {
        display: flex; flex-direction: column; align-items: center;
        padding-top: 8px;
      }
      #panel-header::before {
        content: '';
        display: block;
        width: 36px; height: 4px;
        background: rgba(255,255,255,.35);
        border-radius: 2px;
        margin-bottom: 8px;
      }

      .admin-tab { font-size: 12px; padding: 10px 4px; }

      .tab-panel { padding: 12px 14px; }
    }

    .tab-panel        { display: none; padding: 13px; }
    .tab-panel.active { display: block; }

    .panel-label { font-size: 11px; color: #bbb; margin-bottom: 6px; letter-spacing: .5px; text-transform: uppercase; }

    .admin-input {
      width: 100%; font-family: 'Patrick Hand', cursive; font-size: 15px;
      border: 1px solid #e0e0e0; padding: 8px 10px;
      outline: none; color: #111; background: #fafafa; margin-bottom: 8px;
      resize: none; transition: border-color .18s;
    }
    .admin-input:focus        { border-color: #111; background: #fff; }
    .admin-input::placeholder { color: #bbb; }

    .admin-btn {
      width: 100%; font-family: 'Patrick Hand', cursive; font-size: 15px;
      background: #111; color: #fff;
      border: none; padding: 9px; cursor: pointer;
      transition: opacity .15s; margin-top: 2px;
    }
    .admin-btn:hover  { opacity: .85; }
    .admin-btn:active { opacity: .7; }
    .admin-btn.ghost  { background: #fff; color: #888; border: 1px solid #e0e0e0; }
    .admin-btn.ghost:hover { border-color: #111; color: #111; }
    .admin-btn.red    { background: #e63946; }
    .admin-btn.red:hover { background: #c1121f; opacity: 1; }

    .divider { height: 1px; background: #eee; margin: 11px 0; }

    /* Poll builder */
    .poll-option-input-wrap { display: flex; gap: 5px; margin-bottom: 6px; align-items: center; }
    .poll-option-input-wrap input {
      flex: 1; font-family: 'Patrick Hand', cursive; font-size: 14px;
      border: 1px solid #e0e0e0; padding: 6px 8px;
      outline: none; background: #fafafa; color: #111; transition: border-color .18s;
    }
    .poll-option-input-wrap input:focus       { border-color: #111; }
    .poll-option-input-wrap input::placeholder { color: #bbb; }
    .remove-option {
      background: none; border: 1px solid #e0e0e0;
      font-size: 15px; color: #bbb; cursor: pointer; padding: 3px 7px;
      transition: border-color .15s, color .15s;
    }
    .remove-option:hover { border-color: #111; color: #111; }
    #add-option-btn {
      font-family: 'Patrick Hand', cursive; font-size: 13px;
      background: #fafafa; border: 1px dashed #ccc;
      padding: 6px 12px; cursor: pointer; color: #aaa; margin-bottom: 8px; width: 100%;
      transition: border-color .18s, color .18s;
    }
    #add-option-btn:hover { border-color: #111; color: #111; }

    /* BG color picker */
    .color-presets { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 10px; }
    .color-swatch  { aspect-ratio: 1; cursor: pointer; border: 2px solid transparent; transition: transform .15s; }
    .color-swatch:hover    { transform: scale(1.1); }
    .color-swatch.selected { border-color: #111; }
    .color-custom-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    #custom-color { width: 38px; height: 28px; border: 1px solid #e0e0e0; padding: 2px; cursor: pointer; background: #fafafa; }
    #custom-color-label { font-size: 13px; color: #aaa; }

    /* Draw tab */
    .draw-tool-row { display: flex; gap: 5px; margin-bottom: 8px; }
    .tool-btn {
      flex: 1; font-family: 'Patrick Hand', cursive; font-size: 13px;
      background: #fafafa; border: 1px solid #e0e0e0;
      padding: 7px 4px; cursor: pointer; color: #888;
      transition: all .15s; text-align: center;
    }
    .tool-btn:hover  { border-color: #111; color: #111; }
    .tool-btn.active { background: #111; border-color: #111; color: #fff; }

    .draw-colors { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
    .draw-color-swatch {
      width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: transform .15s, border-color .15s; flex-shrink: 0;
    }
    .draw-color-swatch:hover    { transform: scale(1.18); }
    .draw-color-swatch.selected { border-color: #111; box-shadow: 0 0 0 1px #fff inset; }

    .size-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
    .size-row label { font-size: 11px; color: #bbb; text-transform: uppercase; white-space: nowrap; }
    #brush-size     { flex: 1; accent-color: #111; cursor: pointer; }
    #brush-size-val { font-size: 13px; color: #111; min-width: 18px; text-align: right; }

    #draw-toggle-btn {
      width: 100%; font-family: 'Patrick Hand', cursive; font-size: 15px;
      background: #fff; border: 1.5px solid #111;
      padding: 8px; cursor: pointer; color: #111;
      transition: all .15s; margin-bottom: 8px;
    }
    #draw-toggle-btn:hover   { background: #f5f5f5; }
    #draw-toggle-btn.drawing { background: #111; color: #fff; }

    /* Abuse tab */
    .abuse-btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
    .abuse-big-btn {
      font-family: 'Patrick Hand', cursive; font-size: 14px;
      background: #fff; border: 1.5px solid #e0e0e0;
      padding: 12px 6px; cursor: pointer; color: #111;
      text-align: center; line-height: 1.3;
      transition: all .15s;
    }
    .abuse-big-btn:hover  { border-color: #111; background: #f5f5f5; }
    .abuse-big-btn:active { background: #111; color: #fff; }
    .abuse-big-btn .abuse-icon { font-size: 22px; display: block; margin-bottom: 3px; }

    /* jumpscare preset thumbnails */
    .js-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .js-preset {
      width: 56px; height: 56px; cursor: pointer; object-fit: cover;
      border: 2px solid transparent; transition: border-color .15s, transform .15s;
      background: #f0f0f0;
    }
    .js-preset:hover    { border-color: #111; transform: scale(1.05); }
    .js-preset.selected { border-color: #e63946; }

    /* ── NAME OVERLAY ── */
    #name-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(255,255,255,.97); z-index: 1000;
      align-items: center; justify-content: center; flex-direction: column; gap: 14px;
    }
    #name-overlay.show { display: flex; }
    #name-overlay h2   { font-size: 22px; color: #111; font-weight: normal; }
    #name-overlay p    { font-size: 13px; color: #aaa; }
    #name-input {
      font-family: 'Patrick Hand', cursive; font-size: 20px;
      border: none; border-bottom: 2px solid #111;
      padding: 6px 2px; outline: none; text-align: center;
      width: 200px; background: transparent; color: #111;
    }
    #name-confirm {
      font-family: 'Patrick Hand', cursive; font-size: 16px;
      background: #111; color: #fff;
      border: none; padding: 10px 36px; cursor: pointer;
    }
    #name-confirm:hover { opacity: .85; }
  </style>
</head>
<body>

<!-- JUMPSCARE OVERLAY (fixed, full screen) -->
<div id="jumpscare-overlay">
  <img id="jumpscare-img" src="" alt=""/>
</div>

<div id="app">

  <!-- MAIN AREA -->
  <div id="main">
    <canvas id="draw-canvas"></canvas>
    <div id="banner-stack"></div>

    <div id="poll-widget">
      <div id="poll-question"></div>
      <div id="poll-options"></div>
      <button id="poll-close">dismiss</button>
    </div>

    <div id="viewer-pill">👁 <b id="viewer-count">1</b> viewing</div>
  </div>

  <!-- ADMIN SIDEBAR -->
  <div id="admin-panel">
    <div id="panel-inner">
      <div id="panel-header">
        <h1>🛠 admin panel</h1>
        <p id="admin-name-display">not logged in</p>
      </div>
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="msg">💬 msg</button>
        <button class="admin-tab" data-tab="abuse">💥 abuse</button>
        <button class="admin-tab" data-tab="draw">🖌 draw</button>
        <button class="admin-tab" data-tab="poll">📊 poll</button>
        <button class="admin-tab" data-tab="bg">🎨 bg</button>
      </div>
      <div id="panel-content">

        <!-- MSG -->
        <div class="tab-panel active" id="tab-msg">
          <div class="panel-label">message everyone</div>
          <textarea class="admin-input" id="msg-input" rows="3" maxlength="200" placeholder="say something…"></textarea>
          <button class="admin-btn" id="send-msg-btn">send to all</button>
        </div>

        <!-- ABUSE -->
        <div class="tab-panel" id="tab-abuse">

          <!-- Shake -->
          <div class="panel-label">screen shake</div>
          <div class="abuse-btn-grid" style="margin-bottom:12px">
            <button class="abuse-big-btn" id="shake-sm-btn">
              <span class="abuse-icon">📳</span>light
            </button>
            <button class="abuse-big-btn" id="shake-lg-btn">
              <span class="abuse-icon">💥</span>NUKE
            </button>
          </div>

          <div class="divider"></div>

          <!-- Jumpscare -->
          <div class="panel-label">jumpscare</div>

          <div class="panel-label" style="margin-top:4px">presets</div>
          <div class="js-presets" id="js-presets">
            <!-- populated by JS -->
          </div>

          <div class="panel-label">or custom image url</div>
          <input class="admin-input" id="js-custom-url" type="url" placeholder="https://…" style="margin-bottom:6px"/>

          <div class="panel-label">duration</div>
          <div style="display:flex;gap:5px;margin-bottom:8px">
            <button class="tool-btn active" data-dur="800">short</button>
            <button class="tool-btn" data-dur="1800">mid</button>
            <button class="tool-btn" data-dur="3500">long</button>
          </div>

          <button class="admin-btn red" id="fire-jumpscare-btn">🔴 fire jumpscare</button>
        </div>

        <!-- DRAW -->
        <div class="tab-panel" id="tab-draw">
          <button id="draw-toggle-btn">✏️ start drawing</button>
          <div class="panel-label">tool</div>
          <div class="draw-tool-row">
            <button class="tool-btn active" data-tool="pen">✏️ pen</button>
            <button class="tool-btn" data-tool="eraser">🧹 erase</button>
          </div>
          <div class="panel-label">color</div>
          <div class="draw-colors">
            <div class="draw-color-swatch selected" style="background:#111111" data-color="#111111"></div>
            <div class="draw-color-swatch" style="background:#ffffff;border-color:#ccc" data-color="#ffffff"></div>
            <div class="draw-color-swatch" style="background:#e94560" data-color="#e94560"></div>
            <div class="draw-color-swatch" style="background:#ffe135" data-color="#ffe135"></div>
            <div class="draw-color-swatch" style="background:#0bce83" data-color="#0bce83"></div>
            <div class="draw-color-swatch" style="background:#3fa9f5" data-color="#3fa9f5"></div>
            <div class="draw-color-swatch" style="background:#f5a623" data-color="#f5a623"></div>
            <div class="draw-color-swatch" style="background:#b44fff" data-color="#b44fff"></div>
            <div class="draw-color-swatch" style="background:#ff6b35" data-color="#ff6b35"></div>
          </div>
          <div class="size-row">
            <label>size</label>
            <input type="range" id="brush-size" min="2" max="40" value="6"/>
            <span id="brush-size-val">6</span>
          </div>
          <div class="divider"></div>
          <button class="admin-btn ghost" id="clear-canvas-btn">🗑 clear canvas</button>
        </div>

        <!-- POLL -->
        <div class="tab-panel" id="tab-poll">
          <div class="panel-label">question</div>
          <input class="admin-input" id="poll-q-input" type="text" maxlength="120" placeholder="ask something…"/>
          <div class="panel-label">options</div>
          <div id="poll-options-builder">
            <div class="poll-option-input-wrap">
              <input type="text" placeholder="Option 1" maxlength="60"/>
              <button class="remove-option" type="button">×</button>
            </div>
            <div class="poll-option-input-wrap">
              <input type="text" placeholder="Option 2" maxlength="60"/>
              <button class="remove-option" type="button">×</button>
            </div>
          </div>
          <button id="add-option-btn">+ add option</button>
          <button class="admin-btn" id="send-poll-btn">launch poll</button>
          <div class="divider"></div>
          <button class="admin-btn ghost" id="close-poll-btn">✕ close poll</button>
        </div>

        <!-- BG -->
        <div class="tab-panel" id="tab-bg">
          <div class="panel-label">background color</div>
          <div class="color-presets">
            <div class="color-swatch selected" style="background:#ffffff;border-color:#ccc" data-color="#ffffff"></div>
            <div class="color-swatch" style="background:#111111" data-color="#111111"></div>
            <div class="color-swatch" style="background:#f9f3e8" data-color="#f9f3e8"></div>
            <div class="color-swatch" style="background:#e8f4f9" data-color="#e8f4f9"></div>
            <div class="color-swatch" style="background:#edf9e8" data-color="#edf9e8"></div>
            <div class="color-swatch" style="background:#f9e8e8" data-color="#f9e8e8"></div>
            <div class="color-swatch" style="background:#ffe135" data-color="#ffe135"></div>
            <div class="color-swatch" style="background:#0d1b2a" data-color="#0d1b2a"></div>
            <div class="color-swatch" style="background:#e94560" data-color="#e94560"></div>
            <div class="color-swatch" style="background:#0f3460" data-color="#0f3460"></div>
          </div>
          <div class="color-custom-row">
            <input type="color" id="custom-color" value="#ffffff"/>
            <span id="custom-color-label">custom</span>
          </div>
          <button class="admin-btn" id="send-bg-btn">apply to everyone</button>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- NAME OVERLAY -->
<div id="name-overlay">
  <h2>🛠 admin access</h2>
  <p>what's your name?</p>
  <input id="name-input" type="text" maxlength="30" placeholder="your name" autocomplete="off"/>
  <button id="name-confirm">enter</button>
</div>

<!-- MOBILE CODE BOX -->
<div id="mobile-code-box">
  <div id="mobile-code-label">enter code</div>
  <div id="mobile-code-row">
    <input id="mobile-code-input" type="tel" maxlength="8" placeholder="••••••••" autocomplete="off"/>
    <button id="mobile-code-btn">→</button>
  </div>
</div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, set, remove, onValue,
           query, orderByChild, startAfter, onChildAdded }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInAnonymously }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyC2umvpkas9QCC1PHrWXjk6g67i7Wyr11A",
    authDomain:        "website-9f859.firebaseapp.com",
    databaseURL:       "https://website-9f859-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "website-9f859",
    storageBucket:     "website-9f859.firebasestorage.app",
    messagingSenderId: "756244892931",
    appId:             "1:756244892931:web:18d3975a67547ab3936d36"
  };

  const SECRET   = "191817161514131211";
  const HOLD_MS  = 5500;
  const joinedAt = Date.now();

  let adminName  = localStorage.getItem('admin_name') || '';
  let myVotes    = {};
  let keyBuffer  = '';
  let isAdmin    = false;

  // Draw state
  let drawMode   = false;
  let isPointing = false;
  let drawColor  = '#111111';
  let brushSize  = 6;
  let drawTool   = 'pen';
  let strokeId   = null;
  let lastPt     = null;

  // Jumpscare state
  let jsSelectedUrl = '';
  let jsDuration    = 800;

  // Jumpscare preset images (freely usable meme-style images)
  const JS_PRESETS = [
    { label: 'scary', url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Cat03.jpg/481px-Cat03.jpg' },
    { label: 'wow',   url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Cat_November_2010-1a.jpg/1200px-Cat_November_2010-1a.jpg' },
    { label: 'bruh',  url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Kittyply_edit1.jpg/1200px-Kittyply_edit1.jpg' },
  ];

  // Populate preset thumbnails
  const presetsEl = document.getElementById('js-presets');
  JS_PRESETS.forEach((p, i) => {
    const img = document.createElement('img');
    img.className = 'js-preset';
    img.src = p.url;
    img.title = p.label;
    img.addEventListener('click', () => {
      document.querySelectorAll('.js-preset').forEach(el => el.classList.remove('selected'));
      img.classList.add('selected');
      jsSelectedUrl = p.url;
      document.getElementById('js-custom-url').value = '';
    });
    presetsEl.appendChild(img);
    if (i === 0) { img.classList.add('selected'); jsSelectedUrl = p.url; }
  });

  document.getElementById('js-custom-url').addEventListener('input', e => {
    if (e.target.value.trim()) {
      jsSelectedUrl = e.target.value.trim();
      document.querySelectorAll('.js-preset').forEach(el => el.classList.remove('selected'));
    }
  });

  // Duration buttons
  document.querySelectorAll('[data-dur]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-dur]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      jsDuration = parseInt(btn.dataset.dur);
    });
  });

  // ── Firebase ──────────────────────────────────────
  const app        = initializeApp(firebaseConfig);
  const db         = getDatabase(app);
  const msgsRef    = ref(db, 'messages');
  const pollRef    = ref(db, 'poll');
  const bgRef      = ref(db, 'bgcolor');
  const strokesRef = ref(db, 'strokes');
  const presRef    = ref(db, 'presence');
  const shakeRef   = ref(db, 'shake');
  const jumpRef    = ref(db, 'jumpscare');

  signInAnonymously(getAuth(app)).then(({ user }) => {
    const myPres = ref(db, `presence/${user.uid}`);
    set(myPres, { t: Date.now() });
    import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js")
      .then(m => m.onDisconnect(myPres).remove()).catch(() => {});
  }).catch(console.error);

  onValue(presRef, snap => {
    document.getElementById('viewer-count').textContent =
      snap.exists() ? Object.keys(snap.val()).length : 1;
  });

  // ── Listen: shake ────────────────────────────────
  onValue(shakeRef, snap => {
    if (!snap.exists()) return;
    const data = snap.val();
    if (!data || !data.ts || data.ts <= joinedAt) return;
    triggerShake(data.intensity || 'sm');
  });

  function triggerShake(intensity) {
    const dur = intensity === 'lg' ? 1200 : 600;
    const el  = document.body;

    // Override animation duration via style
    el.style.animationDuration = dur + 'ms';
    el.classList.remove('shaking');
    void el.offsetWidth; // reflow to restart
    el.classList.add('shaking');
    setTimeout(() => {
      el.classList.remove('shaking');
      el.style.animationDuration = '';
    }, dur + 50);

    // For NUKE: also flash background red briefly
    if (intensity === 'lg') {
      const mainEl = document.getElementById('main');
      const origBg = mainEl.style.background;
      mainEl.style.transition = 'none';
      mainEl.style.background = '#e63946';
      setTimeout(() => {
        mainEl.style.transition = 'background 1.2s ease';
        mainEl.style.background = origBg;
      }, 120);
    }
  }

  // ── Listen: jumpscare ────────────────────────────
  onValue(jumpRef, snap => {
    if (!snap.exists()) return;
    const data = snap.val();
    if (!data || !data.ts || data.ts <= joinedAt) return;
    fireJumpscare(data.url, data.duration || 800);
  });

  function fireJumpscare(url, duration) {
    const overlay = document.getElementById('jumpscare-overlay');
    const img     = document.getElementById('jumpscare-img');
    img.src = url;
    overlay.classList.add('show');

    // Shake simultaneously
    triggerShake('sm');

    setTimeout(() => {
      overlay.classList.remove('show');
      img.src = '';
    }, duration);
  }

  // ── Admin: fire shake ─────────────────────────────
  document.getElementById('shake-sm-btn').addEventListener('click', () => {
    set(shakeRef, { intensity: 'sm', ts: Date.now() });
    triggerShake('sm'); // also shake admin's own screen
  });
  document.getElementById('shake-lg-btn').addEventListener('click', () => {
    set(shakeRef, { intensity: 'lg', ts: Date.now() });
    triggerShake('lg');
  });

  // ── Admin: fire jumpscare ─────────────────────────
  document.getElementById('fire-jumpscare-btn').addEventListener('click', () => {
    const url = document.getElementById('js-custom-url').value.trim() || jsSelectedUrl;
    if (!url) { alert('Pick an image or paste a URL!'); return; }
    set(jumpRef, { url, duration: jsDuration, ts: Date.now() });
    fireJumpscare(url, jsDuration); // also show on admin screen
  });

  // ── Canvas ────────────────────────────────────────
  const canvas = document.getElementById('draw-canvas');
  const ctx    = canvas.getContext('2d');
  let strokeCache = null;

  function resizeCanvas() {
    const main = document.getElementById('main');
    canvas.width  = main.clientWidth;
    canvas.height = main.clientHeight;
    replayFromCache();
  }

  function replayFromCache() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!strokeCache) return;
    Object.values(strokeCache).forEach(stroke => {
      if (!stroke.segments) return;
      Object.values(stroke.segments).forEach(paintSeg);
    });
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  onValue(strokesRef, snap => {
    if (!snap.exists()) {
      strokeCache = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (!drawMode) canvas.classList.remove('view-only');
      return;
    }
    const all = snap.val();
    const filtered = {};
    Object.entries(all).forEach(([k, v]) => {
      if (!v.ts || v.ts > joinedAt) filtered[k] = v;
    });
    strokeCache = Object.keys(filtered).length ? filtered : null;
    replayFromCache();
    if (!drawMode) canvas.classList.toggle('view-only', !!strokeCache);
  });

  function paintSeg(s) {
    ctx.save();
    if (s.tool === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)';
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = s.color || '#111';
    }
    ctx.lineWidth = s.size || 6;
    ctx.lineCap   = 'round';
    ctx.lineJoin  = 'round';
    ctx.beginPath();
    ctx.moveTo(s.x1, s.y1);
    ctx.lineTo(s.x2, s.y2);
    ctx.stroke();
    ctx.restore();
  }

  // ── Messages — only after join ────────────────────
  const newMsgsQ = query(msgsRef, orderByChild('ts'), startAfter(joinedAt));
  onChildAdded(newMsgsQ, snap => {
    const d = snap.val();
    if (d?.name && d?.text) showBanner(d.name, d.text);
  });

  // ── Background ────────────────────────────────────
  onValue(bgRef, snap => {
    if (snap.val()) document.getElementById('main').style.background = snap.val();
  });

  // ── Poll — only if created after join ─────────────
  // firstPollSnap: suppress the very first onValue fire (existing data on connect).
  // After that, any change is genuinely new.
  let firstPollSnap = true;
  onValue(pollRef, snap => {
    if (!snap.exists() || !snap.val()?.question) {
      document.getElementById('poll-widget').classList.remove('show');
      firstPollSnap = false;
      return;
    }
    // Always swallow the first snapshot — it's whatever was already in the DB
    if (firstPollSnap) {
      firstPollSnap = false;
      return;
    }
    renderPoll(snap.val(), snap.key);
  });

  // ── Keyboard secret code ──────────────────────────
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (/^\d$/.test(e.key)) {
      keyBuffer += e.key;
      if (keyBuffer.length > SECRET.length) keyBuffer = keyBuffer.slice(-SECRET.length);
      if (keyBuffer === SECRET) { keyBuffer = ''; unlockAdmin(); }
    }
  });

  // ── Mobile code box ───────────────────────────────
  function checkMobileCode() {
    const val = document.getElementById('mobile-code-input').value.trim();
    if (val === SECRET) {
      document.getElementById('mobile-code-input').value = '';
      unlockAdmin();
    } else {
      const inp = document.getElementById('mobile-code-input');
      inp.style.borderColor = '#e63946';
      setTimeout(() => inp.style.borderColor = '', 900);
    }
  }
  document.getElementById('mobile-code-btn').addEventListener('click', checkMobileCode);
  document.getElementById('mobile-code-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkMobileCode();
  });

  // ── Unlock ────────────────────────────────────────
  function unlockAdmin() {
    if (!adminName) {
      document.getElementById('name-overlay').classList.add('show');
      document.getElementById('name-input').focus();
    } else {
      openPanel();
    }
  }

  function openPanel() {
    isAdmin = true;
    document.getElementById('admin-panel').classList.add('open');
    document.getElementById('admin-name-display').textContent = adminName;
    document.getElementById('mobile-code-box').style.display = 'none';
    document.body.classList.add('admin-open');
  }

  // ── Name ──────────────────────────────────────────
  document.getElementById('name-confirm').addEventListener('click', saveName);
  document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') saveName(); });
  function saveName() {
    const val = document.getElementById('name-input').value.trim();
    if (!val) return;
    adminName = val;
    localStorage.setItem('admin_name', adminName);
    document.getElementById('name-overlay').classList.remove('show');
    openPanel();
  }

  // ── Tabs ──────────────────────────────────────────
  document.querySelectorAll('.admin-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ── Send message ──────────────────────────────────
  document.getElementById('send-msg-btn').addEventListener('click', sendMsg);
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });
  function sendMsg() {
    const text = document.getElementById('msg-input').value.trim();
    if (!text || !adminName) return;
    push(msgsRef, { name: adminName, text, ts: Date.now() });
    document.getElementById('msg-input').value = '';
  }

  // ── Poll ──────────────────────────────────────────
  document.getElementById('send-poll-btn').addEventListener('click', () => {
    const q = document.getElementById('poll-q-input').value.trim();
    if (!q) return;
    const inputs = document.querySelectorAll('#poll-options-builder input');
    const opts = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
    if (opts.length < 2) { alert('Add at least 2 options!'); return; }
    const optObj = {};
    opts.forEach((o, i) => { optObj[i] = { label: o, votes: 0 }; });
    set(pollRef, { question: q, options: optObj, ts: Date.now() });
  });

  document.getElementById('close-poll-btn').addEventListener('click', () => remove(pollRef));

  document.getElementById('poll-options-builder').addEventListener('click', e => {
    if (e.target.classList.contains('remove-option')) {
      const all = document.querySelectorAll('#poll-options-builder .poll-option-input-wrap');
      if (all.length > 2) e.target.closest('.poll-option-input-wrap').remove();
    }
  });

  document.getElementById('add-option-btn').addEventListener('click', () => {
    const wrap = document.createElement('div');
    wrap.className = 'poll-option-input-wrap';
    const n = document.querySelectorAll('#poll-options-builder input').length + 1;
    wrap.innerHTML = `<input type="text" placeholder="Option ${n}" maxlength="60"/><button class="remove-option" type="button">×</button>`;
    document.getElementById('poll-options-builder').appendChild(wrap);
  });

  // ── Background ────────────────────────────────────
  let selBg = '#ffffff';
  document.querySelectorAll('.color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      selBg = sw.dataset.color;
      document.getElementById('custom-color').value = selBg;
    });
  });
  document.getElementById('custom-color').addEventListener('input', e => {
    selBg = e.target.value;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  });
  document.getElementById('send-bg-btn').addEventListener('click', () => set(bgRef, selBg));

  // ── Draw tools ────────────────────────────────────
  document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      drawTool = btn.dataset.tool;
    });
  });

  document.querySelectorAll('.draw-color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      document.querySelectorAll('.draw-color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      drawColor = sw.dataset.color;
    });
  });

  document.getElementById('brush-size').addEventListener('input', e => {
    brushSize = parseInt(e.target.value);
    document.getElementById('brush-size-val').textContent = brushSize;
  });

  const drawToggleBtn = document.getElementById('draw-toggle-btn');
  drawToggleBtn.addEventListener('click', () => {
    drawMode = !drawMode;
    if (drawMode) {
      canvas.classList.add('active');
      canvas.classList.remove('view-only');
      drawToggleBtn.textContent = '⏹ stop drawing';
      drawToggleBtn.classList.add('drawing');
    } else {
      canvas.classList.remove('active');
      canvas.classList.add('view-only');
      drawToggleBtn.textContent = '✏️ start drawing';
      drawToggleBtn.classList.remove('drawing');
      strokeId = null; lastPt = null; isPointing = false;
    }
  });

  document.getElementById('clear-canvas-btn').addEventListener('click', () => {
    if (!confirm('Clear canvas for everyone?')) return;
    remove(strokesRef);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.classList.remove('view-only');
    strokeCache = null;
  });

  // ── Canvas pointer events ─────────────────────────
  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const s = e.touches ? e.touches[0] : e;
    return { x: s.clientX - r.left, y: s.clientY - r.top };
  }

  canvas.addEventListener('pointerdown', e => {
    if (!drawMode || !isAdmin) return;
    isPointing = true;
    lastPt     = getPos(e);
    strokeId   = push(strokesRef).key;
    set(ref(db, `strokes/${strokeId}/ts`), Date.now());
    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener('pointermove', e => {
    if (!isPointing || !drawMode || !isAdmin) return;
    const pt  = getPos(e);
    const seg = { x1: lastPt.x, y1: lastPt.y, x2: pt.x, y2: pt.y,
                  color: drawColor, size: brushSize, tool: drawTool };
    paintSeg(seg);
    push(ref(db, `strokes/${strokeId}/segments`), seg);
    lastPt = pt;
  });

  const stopDraw = () => { isPointing = false; lastPt = null; };
  canvas.addEventListener('pointerup',     stopDraw);
  canvas.addEventListener('pointercancel', stopDraw);
  canvas.addEventListener('touchstart', e => { if (drawMode) e.preventDefault(); }, { passive: false });
  canvas.addEventListener('touchmove',  e => { if (drawMode) e.preventDefault(); }, { passive: false });

  // ── Poll renderer ─────────────────────────────────
  function renderPoll(data, pollKey) {
    document.getElementById('poll-question').textContent = data.question;
    const container = document.getElementById('poll-options');
    container.innerHTML = '';
    const opts  = data.options || {};
    const keys  = Object.keys(opts);
    const total = keys.reduce((s, k) => s + (opts[k].votes || 0), 0);
    const voted = myVotes[pollKey];
    keys.forEach(k => {
      const opt = opts[k];
      const pct = total > 0 ? Math.round((opt.votes || 0) / total * 100) : 0;
      const div = document.createElement('div');
      div.className = 'poll-option' + (voted ? ' poll-voted' : '');
      div.innerHTML = `
        <div class="poll-bar-wrap">
          <div class="poll-bar-fill" style="width:${voted ? pct : 0}%"></div>
          <div class="poll-bar-label">
            <span>${esc(opt.label)}</span>
            ${voted ? `<span>${pct}%</span>` : ''}
          </div>
        </div>`;
      if (!voted) {
        div.addEventListener('click', () => {
          myVotes[pollKey] = k;
          set(ref(db, `poll/options/${k}/votes`), (opt.votes || 0) + 1);
        });
      }
      container.appendChild(div);
    });
    document.getElementById('poll-widget').classList.add('show');
  }

  document.getElementById('poll-close').addEventListener('click', () => {
    document.getElementById('poll-widget').classList.remove('show');
  });

  // ── Banner ────────────────────────────────────────
  const stackEl = document.getElementById('banner-stack');
  function showBanner(name, text) {
    const el = document.createElement('div');
    el.className = 'banner';
    el.innerHTML = `<span class="banner-name">${esc(name)}</span>: ${esc(text)}`;
    stackEl.insertBefore(el, stackEl.firstChild);
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
    setTimeout(() => {
      el.classList.remove('visible');
      el.classList.add('fading');
      el.addEventListener('transitionend', () => el.remove(), { once: true });
    }, HOLD_MS);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
